<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Panya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ds.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font-ui);
  background: var(--bg-base); color: var(--text-primary);
  font-size: var(--text-base); -webkit-font-smoothing: antialiased;
}

.auth-shell {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: var(--space-6);
  background: var(--bg-base);
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--r-2xl);
  padding: var(--space-10) var(--space-10);
  width: 100%; max-width: 440px;
  box-shadow: var(--shadow-md);
}

.auth-logo {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.03em;
  margin-bottom: var(--space-8);
}
.auth-logo span { color: var(--brand); }

.auth-title { font-size: var(--text-xl); font-weight: 700; color: var(--text-primary); margin-bottom: var(--space-1); }
.auth-sub { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-8); line-height: var(--leading-relaxed); }

.form-group { margin-bottom: var(--space-5); }
.form-label { display: block; font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-2); }
.form-input {
  width: 100%; padding: 11px var(--space-4);
  border: 1.5px solid var(--border-default); border-radius: var(--r-md);
  font-family: var(--font-ui); font-size: var(--text-sm); color: var(--text-primary);
  background: var(--bg-base); outline: none;
  transition: border-color var(--dur-base), box-shadow var(--dur-base);
}
.form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-m); }
.form-input::placeholder { color: var(--text-muted); }

.btn-primary {
  width: 100%; padding: 13px var(--space-4);
  background: var(--brand); color: #fff;
  border: none; border-radius: var(--r-md);
  font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 600;
  cursor: pointer; transition: all var(--dur-base) var(--ease-out);
  display: flex; align-items: center; justify-content: center; gap: var(--space-2);
}
.btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.auth-divider { display: flex; align-items: center; gap: var(--space-3); margin: var(--space-6) 0; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-default); }
.auth-divider span { font-size: var(--text-xs); color: var(--text-muted); white-space: nowrap; }

.auth-footer { margin-top: var(--space-6); text-align: center; font-size: var(--text-sm); color: var(--text-secondary); }
.auth-footer a { color: var(--brand); font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }

/* Sent state */
.sent-state { display: none; text-align: center; padding: var(--space-4) 0; }
.sent-icon { font-size: 40px; margin-bottom: var(--space-4); }
.sent-title { font-size: var(--text-lg); font-weight: 700; color: var(--text-primary); margin-bottom: var(--space-2); }
.sent-sub { font-size: var(--text-sm); color: var(--text-secondary); line-height: var(--leading-relaxed); }
.sent-email-label { font-weight: 600; color: var(--text-primary); }

.form-state { display: block; }

/* Toast */
#toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 9999; display: flex; flex-direction: column; gap: var(--space-2); pointer-events: none; }
.toast { display: flex; align-items: flex-start; gap: var(--space-3); min-width: 260px; max-width: 360px; padding: var(--space-3) var(--space-4); background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--r-lg); box-shadow: var(--shadow-md); pointer-events: all; font-size: var(--text-sm); animation: slideUp 220ms var(--ease-out); }
.toast-success::before { content: '✓'; color: var(--brand); font-weight: 700; flex-shrink: 0; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">

    <div class="auth-logo">Panya<span>.</span></div>

    <!-- Form state -->
    <div class="form-state" id="form-state">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Enter your email and we'll send you a magic link to sign in instantly — no password needed.</div>

      <div class="form-group">
        <label class="form-label" for="email-input">Email address</label>
        <input class="form-input" id="email-input" type="email" placeholder="you@agency.com" oninput="validateEmail()" autocomplete="email">
      </div>

      <button class="btn-primary" id="send-btn" disabled onclick="sendMagicLink()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4l16 8-16 8V4z"/></svg>
        Send magic link
      </button>

      <div class="auth-divider"><span>or continue with</span></div>

      <button class="btn-primary" style="background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border-default)" onclick="window.toast('Google SSO not available in wireframe','info',2000)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>

    <!-- Sent state -->
    <div class="sent-state" id="sent-state">
      <div class="sent-icon">📬</div>
      <div class="sent-title">Check your inbox</div>
      <div class="sent-sub">We sent a magic link to <span class="sent-email-label" id="sent-email"></span>. Click the link to sign in — it expires in 15 minutes.</div>
      <div style="margin-top:var(--space-6);display:flex;flex-direction:column;gap:var(--space-3)">
        <button class="btn-primary" onclick="window.location.href='index.html'">Continue to Dashboard →</button>
        <button class="btn-primary" style="background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-default)" onclick="resetForm()">Use a different email</button>
      </div>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Request access →</a>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script>
(function() {
  window.toast = function(msg, type, dur) {
    var c = document.getElementById('toast-container');
    var t = document.createElement('div');
    t.className = 'toast toast-' + (type || 'info');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function() { t.remove(); }, dur || 3000);
  };
})();

function validateEmail() {
  var val = document.getElementById('email-input').value.trim();
  var ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  document.getElementById('send-btn').disabled = !ok;
}

function sendMagicLink() {
  var email = document.getElementById('email-input').value.trim();
  document.getElementById('sent-email').textContent = email;
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('sent-state').style.display = 'block';
}

function resetForm() {
  document.getElementById('form-state').style.display = 'block';
  document.getElementById('sent-state').style.display = 'none';
  document.getElementById('email-input').value = '';
  document.getElementById('send-btn').disabled = true;
}
</script>
</body>
</html>
